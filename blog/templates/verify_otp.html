{% extends "base.html" %}
{% block title %}Verify OTP — MyBlog{% endblock %}
{% block content %}
<div class="auth-wrap">
  <div class="auth-brand">
    <div style="font-size:2.5rem;margin-bottom:0.5rem;">✉️</div>
    <div class="auth-brand-name" style="font-size:1.4rem;">Check your email</div>
    <p class="auth-sub">We sent a 6-digit code to <strong style="color:var(--text);">{{ email }}</strong></p>
  </div>
  <div class="form-card">
    <form method="post">
      {% csrf_token %}
      <div class="form-field-wrap">
        <label class="form-label-custom">Enter OTP</label>
        <input type="text" name="otp" placeholder="• • • • • •" maxlength="6" autocomplete="one-time-code"
               style="font-size:1.8rem;letter-spacing:0.6rem;text-align:center;">
      </div>
      {% if error %}
        <div style="background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);border-radius:8px;padding:0.7rem 1rem;margin-bottom:1rem;font-size:0.84rem;color:#ef4444;font-weight:600;">
          {{ error }}
        </div>
      {% endif %}
      <button type="submit" class="btn-primary-custom w-100 mt-2">Verify</button>
    </form>
    <p style="text-align:center;font-size:0.75rem;color:var(--text-3);margin-top:1rem;">Code expires in 10 minutes</p>
  </div>
</div>
{% endblock %}
