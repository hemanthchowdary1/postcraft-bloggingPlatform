{% extends "base.html" %}
{% block title %}Login — MyBlog{% endblock %}
{% block content %}
<div class="auth-wrap">
  <div class="auth-brand">
    <div class="auth-brand-name">My<span>Blog</span></div>
    <p class="auth-sub">Welcome back</p>
  </div>
  <div class="form-card">
    <form method="post">
      {% csrf_token %}
      {% for field in form %}
        <div class="form-field-wrap">
          <label class="form-label-custom">{{ field.label }}</label>
          {{ field }}
          {% if field.errors %}<span class="form-error">{{ field.errors|striptags }}</span>{% endif %}
        </div>
      {% endfor %}
      <button type="submit" class="btn-primary-custom w-100 mt-2">Sign In</button>
    </form>
    <p style="text-align:center;font-size:0.84rem;color:var(--text-3);margin-top:1.25rem;">
      Don't have an account? <a href="{% url 'blog:signup' %}" style="font-weight:700;">Sign up</a>
    </p>
  </div>
</div>
{% endblock %}
