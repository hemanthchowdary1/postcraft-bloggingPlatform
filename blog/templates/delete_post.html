{% extends "base.html" %}
{% block title %}Delete Post — MyBlog{% endblock %}
{% block content %}
<div style="max-width:480px;margin:4rem auto;text-align:center;">
  <div style="font-size:2.8rem;margin-bottom:1rem;">🗑️</div>
  <h2 style="font-size:1.7rem;font-weight:800;letter-spacing:-0.03em;margin-bottom:0.5rem;">Delete this post?</h2>
  <p style="color:var(--text-3);font-size:0.88rem;margin-bottom:0.4rem;">You're about to permanently delete:</p>
  <p style="font-weight:700;color:var(--text);font-size:1rem;margin-bottom:2rem;">"{{ post.title }}"</p>
  <div class="danger-zone" style="text-align:left;margin-bottom:2rem;">
    <p style="font-size:0.82rem;color:var(--danger);font-weight:700;margin-bottom:0.3rem;">⚠ This cannot be undone</p>
    <p style="font-size:0.8rem;color:var(--text-3);margin:0;">All comments, likes and bookmarks will also be removed.</p>
  </div>
  <form method="post">
    {% csrf_token %}
    <div class="d-flex gap-2 justify-content-center">
      <a href="{{ post.get_absolute_url }}" class="btn-ghost">Cancel</a>
      <button type="submit" class="btn-danger-custom">Yes, Delete It</button>
    </div>
  </form>
</div>
{% endblock %}
